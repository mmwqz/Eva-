<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Для Евы ❤️</title>
<style>
    body {
        margin: 0;
        background: radial-gradient(circle at center, #2a0008 0%, #120003 60%, #000000 100%);
        color: #ff4d6d;
        font-family: monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        overflow: hidden;
    }

    pre {
        font-size: 10px;
        line-height: 10px;
        text-align: center;
        text-shadow: 0 0 10px #ff4d6d;
    }

    .text {
        margin-top: 12px;
        font-size: 18px;
        text-align: center;
        max-width: 90%;
        white-space: pre-line;
    }

    .hint {
        margin-top: 8px;
        font-size: 14px;
        opacity: 0.6;
        animation: fadeHint 2s infinite alternate;
    }

    @keyframes fadeHint {
        from { opacity: 0.3; }
        to { opacity: 0.8; }
    }

    .scene {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: opacity 1s ease;
    }

    .hidden {
        opacity: 0;
        pointer-events: none;
    }

    .cursor {
        display: inline-block;
        width: 10px;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        50% { opacity: 0; }
    }
</style>
</head>
<body>

<!-- СЦЕНА 1 -->
<div id="scene1" class="scene">
    <pre id="heart"></pre>
    <div class="text">Ева, ты прекрасна ❤️</div>
    <div class="hint">нажми на экран</div>
</div>

<!-- СЦЕНА 2 -->
<div id="scene2" class="scene hidden">
    <div id="typing" class="text"></div>
</div>

<script>
let t = 0;
let scene = 1;
let clickFlash = 0;

const message = `Ты очень дорога мне,
и я правда счастлив с тобой.

С тобой спокойно и легко,
и мне это очень важно.

Мне очень комфортно рядом с тобой,
и я это правда ценю ❤️`;

let i = 0;

function typeText() {
    if (i <= message.length) {
        document.getElementById("typing").innerHTML =
            message.substring(0, i) + '<span class="cursor">|</span>';
        i++;
        setTimeout(typeText, 20);
    } else {
        document.getElementById("typing").innerHTML = message;
    }
}

// клик + вспышка
document.body.addEventListener("click", () => {
    if (scene === 1) {
        clickFlash = 1;

        setTimeout(() => {
            document.getElementById("scene1").classList.add("hidden");
            document.getElementById("scene2").classList.remove("hidden");
            scene = 2;
            typeText();
        }, 250);
    }
});

// сердце
function render() {
    if (scene !== 1) return;

    let output = "";

    let scale = 1 + 0.12 * Math.sin(t);
    let flash = Math.pow(Math.max(0, Math.sin(t)), 8);

    clickFlash *= 0.9;

    for (let y = 1.3; y > -1.3; y -= 0.065) {
        for (let x = -1.3; x < 1.3; x += 0.04) {

            let xr = x / scale;
            let yr = y / scale;

            let a = xr*xr + yr*yr - 1;
            let f = a*a*a - xr*xr*yr*yr*yr;

            if (f <= 0) {
                let depth = Math.exp(f * 3);
                let center = Math.exp(-(xr*xr + yr*yr) * 1.5);

                let pulse = 0.5 + 0.5 * Math.sin(t);

                let light = (0.7 * depth + 0.3 * center) *
                            (pulse + flash + clickFlash * 1.5);

                let chars = " .:-=+*#%@";
                let index = Math.floor(light * (chars.length - 1));

                output += chars[Math.max(0, Math.min(chars.length - 1, index))];
            } else {
                output += " ";
            }
        }
        output += "\n";
    }

    document.getElementById("heart").textContent = output;
    t += 0.08;
}

setInterval(render, 40);
</script>

</body>
</html>
